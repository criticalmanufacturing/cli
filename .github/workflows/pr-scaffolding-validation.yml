name: CLI Scaffolding Validation (MES matrix)

on:
  workflow_call: {}
  workflow_dispatch: {}
  pull_request_target:
    types: [opened, edited, synchronize]

env:
  NG_CLI_ANALYTICS: false
  CRITICALMANUFACTURING_IO_USER: ${{ vars.CRITICALMANUFACTURING_IO_USER }}
  CRITICALMANUFACTURING_IO_TOKEN: ${{ secrets.CRITICALMANUFACTURING_IO_TOKEN }}
  CRITICALMANUFACTURING_NPM_REGISTRY: ${{ vars.CRITICALMANUFACTURING_NPM_REGISTRY }}
  CRITICALMANUFACTURING_NUGET_REGISTRY: ${{ vars.CRITICALMANUFACTURING_NUGET_REGISTRY }}
  VALIDATION_DIR: /tmp/scaffolding-validation

jobs:
  scaffolding-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      packages: read
    if: >
      github.event_name != 'pull_request_target' ||
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    strategy:
      matrix:
        include:
          - mes-major: 10
            node-version: '18.x'
          - mes-major: 11
            node-version: '20.x'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies
        run: npm ci

      - name: Build and pack CLI
        run: bash .github/scripts/build-and-pack.sh bundle

      - name: Pack CLI
        working-directory: npm
        run: npm pack

      - name: Install CLI globally
        working-directory: npm
        run: npm install -g ./

      - name: Login to NPM registry
        run: |
          cmf -l debug login NPM $CRITICALMANUFACTURING_NPM_REGISTRY --auth-type Basic --username $CRITICALMANUFACTURING_IO_USER --password $CRITICALMANUFACTURING_IO_TOKEN

      - name: Login to NuGet registry
        run: |
          cmf -l debug login NuGet $CRITICALMANUFACTURING_NUGET_REGISTRY --auth-type Basic --username $CRITICALMANUFACTURING_IO_USER --password $CRITICALMANUFACTURING_IO_TOKEN

      - name: Resolve full MES version for major ${{ matrix.mes-major }}
        id: mes-version
        run: |
          MES_MAJOR=${{ matrix.mes-major }}
          MES_VERSION=$(node - <<'NODE'
const major = process.env.MES_MAJOR;
const registry = process.env.CRITICALMANUFACTURING_NPM_REGISTRY;
const pkg = 'cmf-mes-ui';
const versionsJson = require('child_process').execSync(`npm view ${pkg} versions --json --registry ${registry}`, { encoding: 'utf8' });
const versions = JSON.parse(versionsJson || '[]');
const filtered = versions.filter(v => v.startsWith(`${major}.`));
if (filtered.length === 0) { console.error(`No versions found for ${major}.x`); process.exit(1); }
filtered.sort((a, b) => a.localeCompare(b, 'en', { numeric: true }));
process.stdout.write(filtered[filtered.length - 1]);
NODE
)
          echo "MES_VERSION=$MES_VERSION"
          echo "version=$MES_VERSION" >> $GITHUB_OUTPUT

      - name: Resolve ngx-schematics version for MES ${{ steps.mes-version.outputs.version }}
        id: ngx-schematics-version
        run: |
          MES_VERSION=${{ steps.mes-version.outputs.version }}
          MES_DIST_TAG="release-${MES_VERSION//./}"
          echo "mes-dist-tag=$MES_DIST_TAG" >> $GITHUB_OUTPUT
          NGX_VERSION=$(npm view @criticalmanufacturing/ngx-schematics@$MES_DIST_TAG version --registry $CRITICALMANUFACTURING_NPM_REGISTRY 2>/dev/null)
          if [ -z "$NGX_VERSION" ]; then
            echo "::error::Failed to resolve ngx-schematics version for tag $MES_DIST_TAG"
            exit 1
          fi
          echo "version=$NGX_VERSION" >> $GITHUB_OUTPUT

      - name: Clone training-bootstrap for scaffolding config
        run: |
          mkdir -p $VALIDATION_DIR
          git clone https://github.com/criticalmanufacturing/training-bootstrap.git $VALIDATION_DIR/training-bootstrap
          rm $VALIDATION_DIR/training-bootstrap/infra.json

      - name: Run cmf -l debug init (MES ${{ steps.mes-version.outputs.version }})
        working-directory: ${{ env.VALIDATION_DIR }}
        run: |
          cmf -l debug init ValidationProject \
            --version 1.0.0 \
            --config $VALIDATION_DIR/training-bootstrap/parameters.json \
            --MESVersion ${{ steps.mes-version.outputs.version }} \
            --nugetVersion ${{ steps.mes-version.outputs.version }} \
            --testScenariosNugetVersion ${{ steps.mes-version.outputs.version }} \
            --npmRegistry $CRITICALMANUFACTURING_NPM_REGISTRY \
            --nugetRegistry $CRITICALMANUFACTURING_NUGET_REGISTRY \
            --nugetRegistryUsername $CRITICALMANUFACTURING_IO_USER \
            --nugetRegistryPassword $CRITICALMANUFACTURING_IO_TOKEN \
            --deploymentDir $VALIDATION_DIR/deployments \
            --ngxSchematicsVersion ${{ steps.ngx-schematics-version.outputs.version }}

      - name: Run cmf new business
        working-directory: ${{ env.VALIDATION_DIR }}/ValidationProject
        run: cmf -l debug new business

      - name: Run cmf new data
        working-directory: ${{ env.VALIDATION_DIR }}/ValidationProject
        run: cmf -l debug new data --businessPackage ./Cmf.Custom.Business/

      - name: Run cmf new html
        working-directory: ${{ env.VALIDATION_DIR }}/ValidationProject
        run: cmf -l debug new html

      - name: Run cmf new help
        working-directory: ${{ env.VALIDATION_DIR }}/ValidationProject
        run: cmf -l debug new help

      - name: Run cmf new test
        working-directory: ${{ env.VALIDATION_DIR }}/ValidationProject
        run: cmf -l debug new test

      - name: Run cmf new database
        working-directory: ${{ env.VALIDATION_DIR }}/ValidationProject
        run: cmf -l debug new database

      - name: Run cmf new reporting
        working-directory: ${{ env.VALIDATION_DIR }}/ValidationProject
        run: cmf -l debug new reporting

      - name: Run cmf new grafana
        working-directory: ${{ env.VALIDATION_DIR }}/ValidationProject
        run: cmf -l debug new grafana

      - name: Run cmf new iot
        working-directory: ${{ env.VALIDATION_DIR }}/ValidationProject
        run: cmf -l debug new iot

      - name: Run cmf new securityPortal
        working-directory: ${{ env.VALIDATION_DIR }}/ValidationProject
        run: cmf -l debug new securityPortal

      - name: Run cmf build
        working-directory: ${{ env.VALIDATION_DIR }}/ValidationProject
        run: cmf -l debug build

      - name: Run cmf pack
        working-directory: ${{ env.VALIDATION_DIR }}/ValidationProject
        run: cmf -l debug pack
