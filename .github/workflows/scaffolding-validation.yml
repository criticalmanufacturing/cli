name: CLI Scaffolding Validation

on:
  workflow_call: {}
  workflow_dispatch: {}
  pull_request:
    types: [opened, edited, synchronize]
    paths-ignore:
      - 'features/**'
  # pull_request_target:
  #   types: [opened, edited, synchronize]
  #   paths-ignore:
  #     - 'features/**'

